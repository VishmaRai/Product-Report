<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f9d76">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Product Report">
<title>Product Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#f4f5f3;--card:#ffffff;--ink:#16191c;--muted:#8a9099;--line:#e7e9e6;
    --green:#1f9d76;--green-bg:#e7f4ef;--amber:#c07a1d;--amber-bg:#fbf1e0;
    --blue:#2f6fed;--blue-bg:#e9f0fd;--gray:#6b7280;--gray-bg:#ececef;--red:#c0392b;
    --shadow:0 1px 2px rgba(20,25,28,.04),0 6px 18px rgba(20,25,28,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg)}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.4}
  .app{max-width:440px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  .upload-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
               padding:32px 24px;text-align:center;gap:8px}
  .brandmark{width:64px;height:64px;border-radius:16px;margin-bottom:6px}
  .upload-wrap h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .upload-wrap p{color:var(--muted);font-size:14px;max-width:268px}
  .drop{margin-top:20px;width:100%;border:1.5px dashed var(--line);border-radius:16px;background:var(--card);
        padding:34px 20px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
  .drop:hover,.drop.over{border-color:var(--green);background:var(--green-bg)}
  .drop .ic{font-size:30px}.drop .big{font-weight:600;margin-top:8px}
  .drop .sm{color:var(--muted);font-size:13px;margin-top:2px}
  .err{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
  .keep{margin-top:6px;background:none;border:none;color:var(--green);font-weight:600;font-size:14px;cursor:pointer}

  header{position:sticky;top:0;z-index:5;background:rgba(244,245,243,.93);
         backdrop-filter:saturate(150%) blur(8px);padding:14px 16px 8px;border-bottom:1px solid var(--line)}
  .htop{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .htop .ttl{font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .htop .reload{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-weight:600}
  .htop .date{font-size:13px;color:var(--muted);margin-left:auto}
  .search{width:100%;border:1px solid var(--line);background:var(--card);border-radius:12px;
          padding:12px 14px;font-size:16px;color:var(--ink);outline:none;box-shadow:var(--shadow)}
  .search:focus{border-color:var(--green)}.search::placeholder{color:var(--muted)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:999px;
        padding:7px 12px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap}
  .chip .c{color:var(--muted);margin-left:5px}
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.active .c{color:rgba(255,255,255,.7)}

  main{flex:1;padding:8px 16px 40px}
  .listlabel{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 4px 8px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);
       border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.12s}
  .row:active{transform:scale(.99)}.row:hover{border-color:#d3d7d2}
  .row .nm{font-weight:600;font-size:15px;letter-spacing:-.01em}
  .row .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:7px}
  .row .rt{text-align:right;flex-shrink:0}
  .row .rt .a{font-size:14px;font-weight:600}.row .rt .b{font-size:11px;color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px}

  .badge{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border-radius:6px;flex:0 0 auto}
  .b-Hero{color:var(--green);background:var(--green-bg)}
  .b-Core{color:var(--blue);background:var(--blue-bg)}
  .b-Slow{color:var(--amber);background:var(--amber-bg)}
  .b-Dead{color:var(--gray);background:var(--gray-bg)}

  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--green);
        font-weight:600;font-size:14px;cursor:pointer;padding:6px 0;margin:4px 0 6px}
  .pname{font-size:27px;font-weight:800;letter-spacing:-.025em;line-height:1.15}
  .psub{display:flex;align-items:center;gap:9px;margin-top:9px;flex-wrap:wrap}
  .pill{font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;background:var(--card);border:1px solid var(--line)}
  .pill.com{color:var(--muted)}
  .totals{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 6px}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 16px 14px;box-shadow:var(--shadow)}
  .tcard .lbl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
  .tcard .qty{font-size:30px;font-weight:800;letter-spacing:-.03em;margin-top:6px;line-height:1}
  .tcard .amt{font-size:13px;color:var(--muted);margin-top:6px}
  .tcard .pace{font-size:11px;color:var(--muted);margin-top:3px}
  .tcard.sales .qty{color:var(--green)}.neg{color:var(--red)!important}

  .bsec{margin-top:22px}.bsec .listlabel{margin-left:0;display:flex;justify-content:space-between}
  .bgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .bcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px}
  .bcard.idle{opacity:.4}
  .bcard.push{border-color:#ecd9b4;background:var(--amber-bg)}
  .bcard.send{border-color:#cdd9f5;background:var(--blue-bg)}
  .bcard .code{font-size:13px;font-weight:700;letter-spacing:.02em}
  .bcard .code .gd{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-left:5px}
  .bline{display:flex;justify-content:space-between;font-size:13px;margin-top:7px}
  .bline .k{color:var(--muted)}.bline .v{font-weight:600}.bline .v.sold{color:var(--green)}
  .tg{font-size:11px;color:var(--muted);margin-top:6px}
  .act{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-top:5px}
  .bcard.push .act{color:var(--amber)}.bcard.send .act{color:var(--blue)}
  footer{text-align:center;color:var(--muted);font-size:11px;padding:24px 0 32px}
</style>

<div class="app" id="app"></div>

<script>
/* ---------- verified Bikram Sambat month lengths ---------- */
const BS_CAL={2078:[31,31,31,32,31,31,30,29,30,29,30,30],2079:[31,31,32,31,31,31,30,29,30,29,30,30],
2080:[31,32,31,32,31,30,30,30,29,29,30,30],2081:[31,32,31,32,31,30,30,30,29,30,29,31],
2082:[31,31,32,31,31,31,30,29,30,29,30,30],2083:[31,31,32,31,31,31,30,29,30,29,30,30],
2084:[31,32,31,32,31,30,30,30,29,29,30,31],2085:[30,32,31,32,31,30,30,30,29,30,29,31],
2086:[31,31,32,31,31,31,30,29,30,29,30,30],2087:[31,31,32,32,31,30,30,29,30,29,30,30],
2088:[31,32,31,32,31,30,30,30,29,29,30,31],2089:[30,32,31,32,31,30,30,30,29,30,29,31],
2090:[31,31,32,31,31,31,30,29,30,29,30,30],2091:[31,31,32,32,31,30,30,29,30,29,30,30]};

/* ---------- targets & categories ---------- */
const SALES_BRANCHES=["KTM","NGD","BTL","POK","DMK","BTM","ITH","NPJ","LHN","ATR"];
const TGT={KTM:25,NGD:15,BTL:11,POK:20,DMK:4,BTM:7,ITH:10,NPJ:3,LHN:2.5,ATR:2.5};
const CATS=["Hero","Core","Slow","Dead"];
const FLOOR=1;      // ignore branch targets smaller than 1 unit (too small to judge)
const HIT=0.75;     // a branch must reach 75% of its fair share

const C={sn:0,name:1,com:2,salesStart:3,salesTotal:13,cp:14,salesAmt:15,ont:19,stockStart:20,stockTotal:30,stockAmt:32};

function monthInfo(dateStr){
  const m=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec((dateStr||"").trim());
  if(!m)return{f:1,exact:false,label:""};
  const y=+m[1],mo=+m[2],d=+m[3];
  const arr=BS_CAL[y];const dim=(arr&&arr[mo-1])?arr[mo-1]:30;
  return{f:Math.min(d/dim,1),exact:!!(arr&&arr[mo-1]),d,dim,label:`day ${d}/${dim}`};
}
function categorize(amt,f){
  if(amt>100000*f)return"Hero";
  if(amt>20000*f)return"Core";
  if(amt>5000*f)return"Slow";
  return"Dead";
}
function branchStatus(p){
  return SALES_BRANCHES.map(b=>{
    const target=TGT[b]/100*p.salesTotal, sold=p.sales[b], stock=p.stock[b];
    const pct=target>0?Math.round(sold/target*100):null;
    let status="none";
    if(target>=FLOOR){ status = sold>=HIT*target ? "ok" : (stock>0?"push":"send"); }
    return{b,sold,stock,target,pct,status};
  });
}

/* ---------- state ---------- */
let PRODUCTS=[],REPORT_DATE="",FRAC={f:1,exact:false,label:""};
let view={screen:"upload"};
const $=id=>document.getElementById(id);
const app=$("app");
const qty=n=>(n==null||n===""?"0":Number(n).toLocaleString("en-IN"));
const money=n=>{if(n==null||n==="")return"Rs 0";return"Rs "+Math.round(Number(n)).toLocaleString("en-IN");};
const neg=n=>Number(n)<0?"neg":"";
const esc=s=>(s||"").replace(/"/g,"&quot;");

/* ---------- icon + manifest ---------- */
function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);
  x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}
function makeIcon(){const s=512,c=document.createElement("canvas");c.width=c.height=s;const x=c.getContext("2d");
  x.fillStyle="#1f9d76";roundRect(x,0,0,s,s,112);x.fill();x.fillStyle="#fff";
  const bw=86,gap=42,baseY=378,leftX=120,hs=[118,188,250];
  hs.forEach((h,i)=>{roundRect(x,leftX+i*(bw+gap),baseY-h,bw,h,22);x.fill();});return c.toDataURL("image/png");}
(function(){try{const icon=makeIcon();
  const add=(rel,a)=>{const l=document.createElement("link");l.rel=rel;Object.entries(a).forEach(([k,v])=>l.setAttribute(k,v));document.head.appendChild(l);};
  add("icon",{href:icon,type:"image/png"});add("apple-touch-icon",{href:icon});
  const man={name:"Product Report",short_name:"Product Report",start_url:".",display:"standalone",
    background_color:"#f4f5f3",theme_color:"#1f9d76",
    icons:[{src:icon,sizes:"192x192",type:"image/png"},{src:icon,sizes:"512x512",type:"image/png"}]};
  add("manifest",{href:URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"}))});
}catch(e){}})();

/* ---------- storage ---------- */
const KEY="dr_report_v2";
function save(){try{localStorage.setItem(KEY,JSON.stringify({date:REPORT_DATE,products:PRODUCTS}));}catch(e){}}
function loadSaved(){try{const r=localStorage.getItem(KEY);if(!r)return null;const o=JSON.parse(r);
  return(o&&o.products&&o.products.length)?o:null;}catch(e){return null;}}

/* ---------- parse + derive ---------- */
function parseWorkbook(wb){
  const sh=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(sh,{header:1,raw:true,defval:null});
  let sheetDate="";
  for(let r=0;r<3;r++){for(const cell of(rows[r]||[])){
    if(typeof cell==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(cell.trim())){sheetDate=cell.trim();break;}}
    if(sheetDate)break;}
  const out=[];
  for(const row of rows){
    const sn=row[C.sn],name=row[C.name];
    if(typeof sn!=="number")continue;
    if(typeof name!=="string"||!name.trim()||name.toUpperCase().includes("TOTAL"))continue;
    const sales={},stock={};
    SALES_BRANCHES.forEach((b,i)=>{sales[b]=Number(row[C.salesStart+i])||0;stock[b]=Number(row[C.stockStart+i])||0;});
    out.push({sn,name:name.trim(),star:name.trim().startsWith("*"),com:(row[C.com]||"").toString().trim(),
      cp:row[C.cp],sales,salesTotal:Number(row[C.salesTotal])||0,salesAmt:Number(row[C.salesAmt])||0,
      stock,stockTotal:Number(row[C.stockTotal])||0,stockAmt:Number(row[C.stockAmt])||0,ont:Number(row[C.ont])||0});
  }
  return{sheetDate,products:out};
}
function setReport(date,products){
  REPORT_DATE=date||"";FRAC=monthInfo(REPORT_DATE);PRODUCTS=products;
  PRODUCTS.forEach(p=>{p.category=categorize(p.salesAmt,FRAC.f);p.proj=FRAC.f>0?p.salesAmt/FRAC.f:p.salesAmt;});
}
function handleFile(file){
  $("err").textContent="";
  const fnameDate=(file.name.match(/(\d{4}-\d{2}-\d{2})/)||[])[1]||"";
  const rd=new FileReader();
  rd.onload=e=>{try{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const{sheetDate,products}=parseWorkbook(wb);
    if(!products.length)throw new Error("No products found. Is this the daily report file?");
    setReport(fnameDate||sheetDate,products);save();
    view={screen:"list",query:"",cat:"All"};render();
  }catch(err){$("err").textContent=err.message||"Could not read that file.";}};
  rd.onerror=()=>{$("err").textContent="Could not read that file.";};
  rd.readAsArrayBuffer(file);
}

/* ---------- screens ---------- */
function renderUpload(){
  const showKeep=PRODUCTS.length>0;
  app.innerHTML=`<div class="upload-wrap">
    <canvas class="brandmark" id="mark" width="64" height="64"></canvas>
    <h1>Daily Report</h1>
    <p>Upload the day's Excel report to explore sales, stock and targets by branch.</p>
    <label class="drop" id="drop"><div class="ic">📄</div><div class="big">Upload report</div>
      <div class="sm">Tap to choose an .xlsx file</div><input id="file" type="file" accept=".xlsx,.xls" hidden></label>
    <div class="err" id="err"></div>
    ${showKeep?`<button class="keep" id="keep">‹ Keep current report</button>`:""}</div>`;
  try{const x=$("mark").getContext("2d");const img=new Image();img.onload=()=>x.drawImage(img,0,0,64,64);img.src=makeIcon();}catch(e){}
  $("file").onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);};
  const drop=$("drop");
  ["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
  ["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
  drop.addEventListener("drop",e=>{if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
  if(showKeep)$("keep").onclick=()=>{view={screen:"list",query:"",cat:"All"};render();};
}

function counts(){const c={All:PRODUCTS.length};CATS.forEach(k=>c[k]=0);PRODUCTS.forEach(p=>c[p.category]++);return c;}
function filtered(q,cat){
  let list=PRODUCTS;
  if(cat&&cat!=="All")list=list.filter(p=>p.category===cat);
  q=(q||"").trim().toLowerCase();
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.com.toLowerCase().includes(q));
  return list.slice().sort((a,b)=>b.salesAmt-a.salesAmt);
}
function renderList(){
  const q=view.query||"",cat=view.cat||"All",list=filtered(q,cat),cnt=counts();
  const chips=["All",...CATS].map(k=>`<button class="chip ${k===cat?"active":""}" data-cat="${k}">${k}<span class="c">${cnt[k]}</span></button>`).join("");
  const sub=FRAC.label?` · ${FRAC.label}`:"";
  app.innerHTML=`<header>
    <div class="htop"><span class="ttl">Products</span>
      <button class="reload" id="reload">New file</button>
      <span class="date">${REPORT_DATE||""}${sub}</span></div>
    <input class="search" id="search" placeholder="Search product or company…" value="${esc(q)}" autocomplete="off">
    <div class="chips">${chips}</div>
  </header>
  <main><div class="listlabel">${cat==="All"&&!q?`Top by sales · ${PRODUCTS.length} products`:`${list.length} ${list.length===1?"product":"products"}`}</div>
    <div id="results"></div></main>
  <footer>Daily report viewer · ${REPORT_DATE||""}</footer>`;
  const res=$("results");
  if(!list.length)res.innerHTML=`<div class="empty">Nothing here${q?` for “${esc(q)}”`:""}.</div>`;
  else res.innerHTML=list.slice(0,90).map(p=>{const i=PRODUCTS.indexOf(p);
    return `<div class="row" data-i="${i}">
      <div><div class="nm">${p.name}</div>
        <div class="meta"><span class="badge b-${p.category}">${p.category}</span>${p.com?p.com+" · ":""}Stock ${qty(p.stockTotal)}</div></div>
      <div class="rt"><div class="a num ${neg(p.salesTotal)}">${qty(p.salesTotal)} sold</div>
        <div class="b num">${money(p.salesAmt)}</div></div></div>`;}).join("");
  res.querySelectorAll(".row").forEach(el=>el.onclick=()=>{view={screen:"detail",i:+el.dataset.i,query:q,cat};render();});
  document.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{view.cat=el.dataset.cat;render();});
  const s=$("search");
  s.oninput=e=>{view.query=e.target.value;renderList.focus=true;render();};
  $("reload").onclick=()=>{view={screen:"upload"};render();};
  if(renderList.focus){const v=s.value;s.focus();s.setSelectionRange(v.length,v.length);renderList.focus=false;}
}

function renderDetail(){
  const p=PRODUCTS[view.i];
  const bs=branchStatus(p);
  const nPush=bs.filter(x=>x.status==="push").length, nSend=bs.filter(x=>x.status==="send").length;
  const flagSummary=(nPush||nSend)?`${nPush?nPush+" to push":""}${nPush&&nSend?" · ":""}${nSend?nSend+" to restock":""}`:"all on target";
  const pace=(FRAC.f>0&&FRAC.f<1)?`<div class="pace">on pace for ${money(p.proj)}</div>`:"";
  const ont=`<div class="bcard ${p.ont===0?"idle":""}">
      <div class="code">ONT<span class="gd">Godown</span></div>
      <div class="bline"><span class="k">Stock</span><span class="v num ${neg(p.ont)}">${qty(p.ont)}</span></div>
      <div class="tg">supply source</div></div>`;
  const cards=ont+bs.map(x=>{
    const cls=x.status==="push"?"push":x.status==="send"?"send":(x.sold===0&&x.stock===0?"idle":"");
    const tg=x.target>=FLOOR?`Target ${qty(Math.round(x.target))} · ${x.pct}%`:"";
    const act=x.status==="push"?`<div class="act">Push sales</div>`:x.status==="send"?`<div class="act">Send stock</div>`:"";
    return `<div class="bcard ${cls}"><div class="code">${x.b}</div>
      <div class="bline"><span class="k">Sold</span><span class="v sold num ${neg(x.sold)}">${qty(x.sold)}</span></div>
      <div class="bline"><span class="k">Stock</span><span class="v num ${neg(x.stock)}">${qty(x.stock)}</span></div>
      ${tg?`<div class="tg">${tg}</div>`:""}${act}</div>`;}).join("");
  app.innerHTML=`<main>
    <button class="back" id="back">‹ Back</button>
    <div class="pname">${p.name}</div>
    <div class="psub">
      <span class="badge b-${p.category}">${p.category}</span>
      <span class="pill">CP ${p.cp!=null&&p.cp!==""?money(p.cp):"—"}</span>
      ${p.com?`<span class="pill com">${p.com}</span>`:""}
      ${p.star?`<span class="pill com">★ Star</span>`:""}
    </div>
    <div class="totals">
      <div class="tcard sales"><div class="lbl">Total sold</div>
        <div class="qty num ${neg(p.salesTotal)}">${qty(p.salesTotal)}</div>
        <div class="amt num">${money(p.salesAmt)}</div>${pace}</div>
      <div class="tcard"><div class="lbl">Closing stock</div>
        <div class="qty num ${neg(p.stockTotal)}">${qty(p.stockTotal)}</div>
        <div class="amt num">${money(p.stockAmt)}</div></div>
    </div>
    <div class="bsec"><div class="listlabel"><span>By branch</span><span>${flagSummary}</span></div>
      <div class="bgrid">${cards}</div></div>
    <footer>${REPORT_DATE||""}${FRAC.label?" · "+FRAC.label:""}</footer></main>`;
  $("back").onclick=()=>{view={screen:"list",query:view.query||"",cat:view.cat||"All"};render();};
}

function render(){
  if(view.screen==="upload")renderUpload();
  else if(view.screen==="list")renderList();
  else renderDetail();
  if(view.screen!=="list")window.scrollTo(0,0);
}
(function init(){const s=loadSaved();
