<style>

        border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}

  .prow .det .sh{color:var(--amber);font-weight:600}
  .prow .send{text-align:right;flex:0 0 auto}
  .prow .send .q{font-size:23px;font-weight:800;color:var(--green);line-height:1}
  .prow .send .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}

</style>

<div class="app" id="app"></div>

<script>
/* ---------- verified Bikram Sambat month lengths ---------- */
const BS_CAL={2078:[31,31,31,32,31,31,30,29,30,29,30,30],2079:[31,31,32,31,31,31,30,29,30,29,30,30],
2080:[31,32,31,32,31,30,30,30,29,29,30,30],2081:[31,32,31,32,31,30,30,30,29,30,29,31],
2082:[31,31,32,31,31,31,30,29,30,29,30,30],2083:[31,31,32,31,31,31,30,29,30,29,30,30],
2084:[31,32,31,32,31,30,30,30,29,29,30,31],2085:[30,32,31,32,31,30,30,30,29,30,29,31],
2086:[31,31,32,31,31,31,30,29,30,29,30,30],2087:[31,31,32,32,31,30,30,29,30,29,30,30],
2088:[31,32,31,32,31,30,30,30,29,29,30,31],2089:[30,32,31,32,31,30,30,30,29,30,29,31],
2090:[31,31,32,31,31,31,30,29,30,29,30,30],2091:[31,31,32,32,31,30,30,29,30,29,30,30]};

/* ---------- targets & categories ---------- */
const SALES_BRANCHES=["KTM","NGD","BTL","POK","DMK","BTM","ITH","NPJ","LHN","ATR"];
const TGT={KTM:25,NGD:15,BTL:11,POK:20,DMK:4,BTM:7,ITH:10,NPJ:3,LHN:2.5,ATR:2.5};
const CATS=["Hero","Core","Slow","Dead"];
const STOCKS=["Overstock","Low","Healthy"];
const FLOOR=1,HIT=0.75,OVER=2,UNDER=0.5;   // overstock >2mo cover, low <0.5mo cover
const C={sn:0,name:1,com:2,salesStart:3,salesTotal:13,cp:14,salesAmt:15,ont:19,stockStart:20,stockTotal:30,stockAmt:32};

function monthInfo(d){
  const m=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec((d||"").trim());
  if(!m)return{f:1,exact:false,label:""};
  const y=+m[1],mo=+m[2],dd=+m[3];const arr=BS_CAL[y];const dim=(arr&&arr[mo-1])?arr[mo-1]:30;
  return{f:Math.min(dd/dim,1),exact:!!(arr&&arr[mo-1]),d:dd,dim,label:`day ${dd}/${dim}`};
}
function categorize(amt,f){if(amt>100000*f)return"Hero";if(amt>20000*f)return"Core";if(amt>5000*f)return"Slow";return"Dead";}
function stockHealth(p,f){
  const rate=f>0?p.salesTotal/f:p.salesTotal;            // projected monthly selling rate
  let cover=rate>0?p.stockTotal/rate:(p.stockTotal>0?Infinity:0);
  let status;
  if(rate<=0)status=p.stockTotal>0?"Overstock":"Healthy";
  else if(p.stockTotal>OVER*rate)status="Overstock";
  else if(p.stockTotal<UNDER*rate)status="Low";
  else status="Healthy";
  return{status,cover,rate};
}
function coverText(p){
  if(p.rate<=0)return p.stockTotal>0?"selling 0 · frozen":"no stock";
  if(p.stockTotal<=0)return"out of stock";
  return p.cover<1?Math.round(p.cover*30)+"d cover":p.cover.toFixed(1)+" mo cover";
}
function branchStatus(p){
  return SALES_BRANCHES.map(b=>{
    const target=TGT[b]/100*p.salesTotal,sold=p.sales[b],stock=p.stock[b];
    const pct=target>0?Math.round(sold/target*100):null;
    let status="none";
    if(target>=FLOOR)status=sold>=HIT*target?"ok":(stock>0?"push":"send");
    return{b,sold,stock,target,pct,status};
  });
}
function transferHint(p){
  const dry=SALES_BRANCHES.filter(b=>p.sales[b]>0&&p.stock[b]<=0);
  if(!dry.length)return null;
  let src=null;
  if(p.ont>0)src={name:"ONT godown",qty:p.ont};
  else SALES_BRANCHES.forEach(b=>{if(p.stock[b]>0&&(!src||p.stock[b]>src.qty))src={name:b,qty:p.stock[b]};});
  return src?{dry,src}:null;
}
// ---- Dispatch from the daily Inventory Analysis workbook ----
// Reads each branch sheet (current stock, avg daily sales, 20-day max) and the ONT godown sheet.
// Per branch: send = max(0, 20-day max - current). When the godown can't cover every branch's
// need for a product, it is split by priority of branch sales (biggest seller filled first).
function readAnalysisSheet(wb,name){
  const sh=wb.Sheets[name];if(!sh)return[];
  const rows=XLSX.utils.sheet_to_json(sh,{header:1,raw:true,defval:null});
  let h=-1,ix={};
  for(let r=0;r<rows.length;r++){
    const cells=(rows[r]||[]).map(c=>c==null?"":String(c).trim().toLowerCase());
    if(cells.includes("product")){h=r;
      cells.forEach((c,i)=>{
        if(c==="product")ix.name=i;
        else if(c==="current stock")ix.cur=i;
        else if(c.startsWith("avg daily"))ix.avg=i;
        else if(c.startsWith("max stock"))ix.max=i;
        else if(c==="status")ix.st=i;});
      break;}
  }
  if(h<0||ix.name==null)return[];
  const out=[];
  for(let r=h+1;r<rows.length;r++){
    const nm=rows[r]&&rows[r][ix.name];
    if(nm==null||String(nm).trim()==="")continue;
    out.push({name:String(nm).trim(),
      current:Math.round(Number(rows[r][ix.cur])||0),
      avg:ix.avg!=null?Number(rows[r][ix.avg])||0:0,
      max:Math.round(ix.max!=null?Number(rows[r][ix.max])||0:0),
      status:ix.st!=null?String(rows[r][ix.st]||"").trim():""});
  }
  return out;
}
function buildWbDispatch(wb){
  const ont={};
  readAnalysisSheet(wb,"ONT").forEach(o=>ont[o.name]={current:o.current,max:o.max});
  const prod={};                       // name -> { branch: {need,avg,current,max} }
  let branchRows=0;
  SALES_BRANCHES.forEach(b=>{
    readAnalysisSheet(wb,b).forEach(row=>{
      branchRows++;
      const need=Math.max(0,row.max-row.current);
      (prod[row.name]=prod[row.name]||{})[b]={need,avg:row.avg,current:row.current,max:row.max};
    });
  });
  if(!branchRows)return null;
  const branches={};SALES_BRANCHES.forEach(b=>branches[b]=[]);
  Object.keys(prod).forEach(name=>{
    const per=prod[name];
    const entries=SALES_BRANCHES.filter(b=>per[b]).map(b=>({b,...per[b]}));
    let avail=Math.max(0,(ont[name]&&ont[name].current)||0);
    entries.slice().sort((x,y)=>y.avg-x.avg).forEach(e=>{
      const give=Math.min(e.need,avail);e.send=give;avail-=give;e.shorted=give<e.need;});
    entries.forEach(e=>{if(e.send>0)branches[e.b].push({name,send:e.send,need:e.need,shorted:e.shorted,current:e.current,max:e.max});});
  });
  SALES_BRANCHES.forEach(b=>branches[b].sort((x,y)=>y.send-x.send));
  const reorder=[];
  Object.keys(ont).forEach(name=>{const o=ont[name];const short=Math.max(0,o.max-o.current);
    if(short>0)reorder.push({name,have:o.current,target:o.max,short});});
  reorder.sort((x,y)=>y.short-x.short);
  return{branches,reorder};
}

/* ---------- state ---------- */
let PRODUCTS=[],REPORT_DATE="",FRAC={f:1,exact:false,label:""},WB_DISPATCH=null,NEWNAMES=[];
let view={screen:"upload"};
const $=id=>document.getElementById(id),app=$("app");
const qty=n=>(n==null||n===""?"0":Number(n).toLocaleString("en-IN"));
const money=n=>{if(n==null||n==="")return"Rs 0";return"Rs "+Math.round(Number(n)).toLocaleString("en-IN");};
const neg=n=>Number(n)<0?"neg":"";
const esc=s=>(s||"").replace(/"/g,"&quot;");
const norm=s=>String(s||"").trim().replace(/^\*+|\*+$/g,"").trim().toLowerCase().replace(/\s+/g," ");

/* ---------- icon + manifest ---------- */
function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);
  x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}
function makeIcon(){const s=512,c=document.createElement("canvas");c.width=c.height=s;const x=c.getContext("2d");
  x.fillStyle="#1f9d76";roundRect(x,0,0,s,s,112);x.fill();x.fillStyle="#fff";
  const bw=86,gap=42,baseY=378,leftX=120,hs=[118,188,250];
  hs.forEach((h,i)=>{roundRect(x,leftX+i*(bw+gap),baseY-h,bw,h,22);x.fill();});return c.toDataURL("image/png");}
(function(){try{const icon=makeIcon();
  const add=(rel,a)=>{const l=document.createElement("link");l.rel=rel;Object.entries(a).forEach(([k,v])=>l.setAttribute(k,v));document.head.appendChild(l);};
  add("icon",{href:icon,type:"image/png"});add("apple-touch-icon",{href:icon});
  const man={name:"Product Report",short_name:"Product Report",start_url:".",display:"standalone",
    background_color:"#f4f5f3",theme_color:"#1f9d76",
    icons:[{src:icon,sizes:"192x192",type:"image/png"},{src:icon,sizes:"512x512",type:"image/png"}]};
  add("manifest",{href:URL.createObjectURL(new Blob([JSON.stringify(man)],{type:"application/manifest+json"}))});
}catch(e){}})();

/* ---------- storage ---------- */
const KEY="dr_report_v2";
function save(){try{localStorage.setItem(KEY,JSON.stringify({date:REPORT_DATE,products:PRODUCTS,newNames:NEWNAMES}));}catch(e){}}
function loadSaved(){try{const r=localStorage.getItem(KEY);if(!r)return null;const o=JSON.parse(r);
  return(o&&o.products&&o.products.length)?o:null;}catch(e){return null;}}
const WBKEY="dr_dispatch_v1";
function saveWb(){try{localStorage.setItem(WBKEY,JSON.stringify(WB_DISPATCH));}catch(e){}}
function loadWb(){try{const r=localStorage.getItem(WBKEY);if(!r)return null;const o=JSON.parse(r);
  return(o&&o.branches)?o:null;}catch(e){}return null;}
function clearWb(){try{localStorage.removeItem(WBKEY);}catch(e){}}
function handleWorkbook(file){
  const el=$("wberr");if(el)el.textContent="";
  const wbDate=(file.name.match(/(\d{4}-\d{2}-\d{2})/)||[])[1]||"";
  const rd=new FileReader();
  rd.onload=e=>{try{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const d=buildWbDispatch(wb);
    if(!d)throw new Error("Couldn't find the branch sheets. Is this the Inventory Analysis workbook?");
    d.date=wbDate;WB_DISPATCH=d;saveWb();
    view={screen:"dispatch",mode:"branches"};render();
  }catch(err){const x=$("wberr");if(x)x.textContent=err.message||"Could not read that workbook.";}};
  rd.onerror=()=>{const x=$("wberr");if(x)x.textContent="Could not read that workbook.";};
  rd.readAsArrayBuffer(file);
}
function navTo(go){
  if(go==="dispatch")view={screen:"dispatch",mode:view.mode||"branches"};
  else view=PRODUCTS.length?{screen:"list",query:"",lens:"sales",cat:"All"}:{screen:"upload"};
  render();
}

/* ---------- parse + derive ---------- */
function parseWorkbook(wb){
  const sh=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(sh,{header:1,raw:true,defval:null});
  let sheetDate="";
  for(let r=0;r<3;r++){for(const cell of(rows[r]||[])){
    if(typeof cell==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(cell.trim())){sheetDate=cell.trim();break;}}if(sheetDate)break;}
  const out=[];
  for(const row of rows){
    const sn=row[C.sn],name=row[C.name];
    if(typeof sn!=="number")continue;
    if(typeof name!=="string"||!name.trim()||name.toUpperCase().includes("TOTAL"))continue;
    const sales={},stock={};
    SALES_BRANCHES.forEach((b,i)=>{sales[b]=Number(row[C.salesStart+i])||0;stock[b]=Number(row[C.stockStart+i])||0;});
    out.push({sn,name:name.trim(),star:name.trim().startsWith("*"),com:(row[C.com]||"").toString().trim(),
      cp:row[C.cp],sales,salesTotal:Number(row[C.salesTotal])||0,salesAmt:Number(row[C.salesAmt])||0,
      stock,stockTotal:Number(row[C.stockTotal])||0,stockAmt:Number(row[C.stockAmt])||0,ont:Number(row[C.ont])||0});
  }
  return{sheetDate,products:out,newNames:readNewSheet(wb)};
}
function readNewSheet(wb){
  const name=(wb.SheetNames||[]).find(n=>/new/i.test(n));
  if(!name)return[];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,raw:false,defval:null});
  const skip=new Set(["new","new products","newproducts","name","product","products","s.n","sn","sno","serial","list"]);
  const out=[];
  rows.forEach(r=>(r||[]).forEach(cell=>{
    if(cell==null)return;const s=String(cell).trim();
    if(!s||skip.has(s.toLowerCase())||/^\d+$/.test(s))return;
    out.push(s);
  }));
  return[...new Set(out)];
}
function setReport(date,products,newNames){
  REPORT_DATE=date||"";FRAC=monthInfo(REPORT_DATE);PRODUCTS=products;NEWNAMES=newNames||[];
  const newSet=new Set(NEWNAMES.map(norm));
  PRODUCTS.forEach(p=>{
    p.category=categorize(p.salesAmt,FRAC.f);
    p.proj=FRAC.f>0?p.salesAmt/FRAC.f:p.salesAmt;
    p.isNew=newSet.has(norm(p.name));
    const sh=stockHealth(p,FRAC.f);p.stockHealth=sh.status;p.cover=sh.cover;p.rate=sh.rate;
  });
}
function handleFile(file){
  $("err").textContent="";
  const fnameDate=(file.name.match(/(\d{4}-\d{2}-\d{2})/)||[])[1]||"";
  const rd=new FileReader();
  rd.onload=e=>{try{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
    const{sheetDate,products,newNames}=parseWorkbook(wb);
    if(!products.length)throw new Error("No products found. Is this the daily report file?");
    setReport(fnameDate||sheetDate,products,newNames);save();
    view={screen:"list",query:"",lens:"sales",cat:"All"};render();
  }catch(err){$("err").textContent=err.message||"Could not read that file.";}};
  rd.onerror=()=>{$("err").textContent="Could not read that file.";};
  rd.readAsArrayBuffer(file);
}

function counts(lens){
  const keys=lens==="sales"?CATS:STOCKS;const c={All:PRODUCTS.length};keys.forEach(k=>c[k]=0);
  PRODUCTS.forEach(p=>{const k=lens==="sales"?p.category:p.stockHealth;if(k in c)c[k]++;});
  c.New=PRODUCTS.filter(p=>p.isNew).length;return c;
}
function filtered(lens,q,cat){
  let list=PRODUCTS;
  if(cat==="New")list=list.filter(p=>p.isNew);
  else if(cat&&cat!=="All")list=list.filter(p=>(lens==="sales"?p.category:p.stockHealth)===cat);
  q=(q||"").trim().toLowerCase();
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.com.toLowerCase().includes(q));
  let sort;
  if(lens==="stock"&&cat==="Low")sort=(a,b)=>b.salesAmt-a.salesAmt;
  else if(lens==="stock")sort=(a,b)=>b.stockAmt-a.stockAmt;
  else sort=(a,b)=>b.salesAmt-a.salesAmt;
  return list.slice().sort(sort);
}
function renderList(){
  const q=view.query||"",lens=view.lens||"sales",cat=view.cat||"All";
  const list=filtered(lens,q,cat),cnt=counts(lens);
  const chipKeys=lens==="sales"?["All",...CATS,...(NEWNAMES.length?["New"]:[])]:["All",...STOCKS];
  const chips=chipKeys.map(k=>`<button class="chip ${k===cat?"active":""}" data-cat="${k}">${k}<span class="c">${cnt[k]}</span></button>`).join("");
  const sub=FRAC.label?` · ${FRAC.label}`:"";
  let label;
  if(cat==="New"){const miss=NEWNAMES.length-cnt.New;
    label=`${cnt.New} new ${cnt.New===1?"product":"products"}`+(miss>0?` · ${miss} name${miss===1?"":"s"} from the New sheet not found — check spelling`:"");}
  else if(cat==="All"&&!q)label=lens==="sales"?`Top by sales · ${PRODUCTS.length} products`:`Most frozen first · ${PRODUCTS.length} products`;
  else label=`${list.length} ${list.length===1?"product":"products"}`;
  app.innerHTML=`<header>
    <div class="htop"><div class="nav">
        <button data-go="list" class="on">Products</button>
        <button data-go="dispatch">Dispatch</button></div>
      <button class="reload" id="reload">New file</button>
      <span class="date">${REPORT_DATE||""}${sub}</span></div>
    <input class="search" id="search" placeholder="Search product or company…" value="${esc(q)}" autocomplete="off">
    <div class="seg">
      <button data-lens="sales" class="${lens==="sales"?"on":""}">Sales</button>
      <button data-lens="stock" class="${lens==="stock"?"on":""}">Stock</button>
    </div>
    <div class="chips">${chips}</div>
  </header>
  <main><div class="listlabel">${label}</div><div id="results"></div></main>
  <footer>Daily report viewer · ${REPORT_DATE||""}</footer>`;
  const res=$("results");
  if(!list.length)res.innerHTML=`<div class="empty">Nothing here${q?` for “${esc(q)}”`:""}.</div>`;
  else res.innerHTML=list.map(p=>{const i=PRODUCTS.indexOf(p);
    const nb=p.isNew?`<span class="badge tag-new">New</span>`:"";
    if(lens==="sales")return `<div class="row" data-i="${i}">
      <div><div class="nm">${p.name}</div>
        <div class="meta">${nb}<span class="badge b-${p.category}">${p.category}</span>${p.com?p.com+" · ":""}Stock ${qty(p.stockTotal)}</div></div>
      <div class="rt"><div class="a num ${neg(p.salesTotal)}">${qty(p.salesTotal)} sold</div>
        <div class="b num">${money(p.salesAmt)}</div></div></div>`;
    return `<div class="row" data-i="${i}">
      <div><div class="nm">${p.name}</div>
        <div class="meta">${nb}<span class="badge s-${p.stockHealth}">${p.stockHealth}</span>${coverText(p)}</div></div>
      <div class="rt"><div class="a num ${neg(p.stockTotal)}">${qty(p.stockTotal)} stock</div>
        <div class="b num">${money(p.stockAmt)}</div></div></div>`;}).join("");
  res.querySelectorAll(".row").forEach(el=>el.onclick=()=>{view={screen:"detail",i:+el.dataset.i,ret:{screen:"list",query:q,lens,cat}};render();});
  document.querySelectorAll(".nav button").forEach(el=>el.onclick=()=>navTo(el.dataset.go));
  document.querySelectorAll(".seg button").forEach(el=>el.onclick=()=>{view.lens=el.dataset.lens;view.cat="All";render();});
  document.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{view.cat=el.dataset.cat;render();});
  const s=$("search");
  s.oninput=e=>{view.query=e.target.value;renderList.focus=true;render();};
  $("reload").onclick=()=>{view={screen:"upload"};render();};
  if(renderList.focus){const v=s.value;s.focus();s.setSelectionRange(v.length,v.length);renderList.focus=false;}
}

function renderDetail(){
  const p=PRODUCTS[view.i];
  const bs=branchStatus(p);
  const nPush=bs.filter(x=>x.status==="push").length,nSend=bs.filter(x=>x.status==="send").length;
  const flagSummary=(nPush||nSend)?`${nPush?nPush+" to push":""}${nPush&&nSend?" · ":""}${nSend?nSend+" to restock":""}`:"all on target";
  const pace=(FRAC.f>0&&FRAC.f<1)?`<div class="pace">on pace for ${money(p.proj)}</div>`:"";
  const tr=transferHint(p);
  const trHtml=tr?`<div class="transfer"><span class="tlabel">Transfer</span>
    <div>Send stock to <b>${tr.dry.join(", ")}</b> — ${tr.src.name} has ${qty(tr.src.qty)}.</div></div>`:"";
  const ont=`<div class="bcard ${p.ont===0?"idle":""}">
      <div class="code">ONT<span class="gd">Godown</span></div>
      <div class="bline"><span class="k">Stock</span><span class="v num ${neg(p.ont)}">${qty(p.ont)}</span></div>
      <div class="tg">supply source</div></div>`;
  const cards=ont+bs.map(x=>{
    const cls=x.status==="push"?"push":x.status==="send"?"send":(x.sold===0&&x.stock===0?"idle":"");
    const tg=x.target>=FLOOR?`Target ${qty(Math.round(x.target))} · ${x.pct}%`:"";
    const act=x.status==="push"?`<div class="act">Push sales</div>`:x.status==="send"?`<div class="act">Send stock</div>`:"";
    return `<div class="bcard ${cls}"><div class="code">${x.b}</div>
      <div class="bline"><span class="k">Sold</span><span class="v sold num ${neg(x.sold)}">${qty(x.sold)}</span></div>
      <div class="bline"><span class="k">Stock</span><span class="v num ${neg(x.stock)}">${qty(x.stock)}</span></div>
      ${tg?`<div class="tg">${tg}</div>`:""}${act}</div>`;}).join("");
  app.innerHTML=`<main>
    <button class="back" id="back">‹ Back</button>
    <div class="pname">${p.name}</div>
    <div class="psub">
      ${p.isNew?`<span class="badge tag-new">New</span>`:""}
      <span class="badge b-${p.category}">${p.category}</span>
      <span class="pill">CP ${p.cp!=null&&p.cp!==""?money(p.cp):"—"}</span>
      ${p.com?`<span class="pill com">${p.com}</span>`:""}
      ${p.star?`<span class="pill com">★ Star</span>`:""}
    </div>
    <div class="totals">
      <div class="tcard sales"><div class="lbl">Total sold</div>
        <div class="qty num ${neg(p.salesTotal)}">${qty(p.salesTotal)}</div>
        <div class="amt num">${money(p.salesAmt)}</div>${pace}</div>
      <div class="tcard"><div class="lbl">Closing stock</div>
        <div class="qty num ${neg(p.stockTotal)}">${qty(p.stockTotal)}</div>
        <div class="amt num">${money(p.stockAmt)}</div>
        <div class="hstat h-${p.stockHealth}">● ${p.stockHealth} · ${coverText(p)}</div></div>
    </div>
    ${trHtml}
    <div class="bsec"><div class="listlabel"><span>By branch</span><span>${flagSummary}</span></div>
      <div class="bgrid">${cards}</div></div>
    <footer>${REPORT_DATE||""}${FRAC.label?" · "+FRAC.label:""}</footer></main>`;
  $("back").onclick=()=>{view=view.ret||{screen:"list",query:"",lens:"sales",cat:"All"};render();};
}

function dispatchNav(){
  return `<div class="htop"><div class="nav">
      <button data-go="list">Products</button>
      <button data-go="dispatch" class="on">Dispatch</button></div>
    ${WB_DISPATCH?`<button class="reload" id="newwb">New workbook</button>
    <span class="date">${WB_DISPATCH.date||""}</span>`:""}</div>`;
}
function renderDispatch(){
  if(!WB_DISPATCH){
    app.innerHTML=`<header>${dispatchNav()}</header>
      <div class="upload-wrap" style="min-height:60vh">
        <h1 style="font-size:20px">Dispatch</h1>
        <p>Upload today's <b>Inventory Analysis</b> workbook to generate each branch's send list.</p>
        <label class="drop" id="wbdrop"><div class="ic">📦</div><div class="big">Upload workbook</div>
          <div class="sm">The multi-sheet .xlsx your analysis generates</div>
          <input id="wbfile" type="file" accept=".xlsx,.xls" hidden></label>
        <div class="err" id="wberr"></div></div>`;
    document.querySelectorAll(".nav button").forEach(el=>el.onclick=()=>navTo(el.dataset.go));
    $("wbfile").onchange=e=>{if(e.target.files[0])handleWorkbook(e.target.files[0]);};
    const d=$("wbdrop");
    ["dragover","dragenter"].forEach(ev=>d.addEventListener(ev,e=>{e.preventDefault();d.classList.add("over");}));
    ["dragleave","drop"].forEach(ev=>d.addEventListener(ev,e=>{e.preventDefault();d.classList.remove("over");}));
    d.addEventListener("drop",e=>{if(e.dataTransfer.files[0])handleWorkbook(e.dataTransfer.files[0]);});
    return;
  }
  const mode=view.mode||"branches";
  const seg=`<div class="seg">
      <button data-mode="branches" class="${mode==="branches"?"on":""}">To branches</button>
      <button data-mode="reorder" class="${mode==="reorder"?"on":""}">Godown reorder<span style="opacity:.7">&nbsp;${WB_DISPATCH.reorder.length}</span></button>
    </div>`;
  let body;
  if(mode==="branches"){
    let totUnits=0,totLines=0;
    const cards=SALES_BRANCHES.map(b=>{
      const list=WB_DISPATCH.branches[b]||[];
      const units=list.reduce((s,x)=>s+x.send,0);totUnits+=units;totLines+=list.length;
      return `<div class="dcard ${list.length?"":"empty"}" data-branch="${b}">
        <div class="code">${b}</div>
        <div class="sub">${list.length} ${list.length===1?"product":"products"} to send</div>
        <div class="units">${qty(units)} units</div></div>`;}).join("");
    body=`<div class="dsum">${qty(totUnits)} units across ${totLines} lines to dispatch</div>
      <div class="note">Each branch is topped up to its 20-day level, from real sales history. Pick a branch.</div>
      <div class="dgrid">${cards}</div>`;
  }else{
    const list=WB_DISPATCH.reorder;
    body=`<div class="note">Products where the ONT godown is below its own max — reorder from the supplier. ${list.length} products.</div>`;
    body+=list.length?list.map(r=>
      `<div class="prow"><div><div class="nm">${r.name}</div>
        <div class="det">godown ${qty(r.have)} → max ${qty(r.target)}</div></div>
        <div class="send"><div class="q" style="color:var(--amber)">+${qty(r.short)}</div><div class="l">reorder</div></div></div>`
      ).join(""):`<div class="empty">Godown is at or above max across the board.</div>`;
  }
  app.innerHTML=`<header>${dispatchNav()}${seg}</header>
    <main>${body}</main>
    <footer>From the Inventory Analysis workbook · ${WB_DISPATCH.date||""}</footer>`;
  document.querySelectorAll(".nav button").forEach(el=>el.onclick=()=>navTo(el.dataset.go));
  document.querySelectorAll(".seg button").forEach(el=>el.onclick=()=>{view={screen:"dispatch",mode:el.dataset.mode};render();});
  document.querySelectorAll(".dcard").forEach(el=>el.onclick=()=>{const b=el.dataset.branch;
    if((WB_DISPATCH.branches[b]||[]).length)view={screen:"dispatchBranch",branch:b};render();});
  const rl=$("newwb");if(rl)rl.onclick=()=>{WB_DISPATCH=null;clearWb();view={screen:"dispatch",mode:"branches"};render();};
}

function renderDispatchBranch(){
  const b=view.branch,list=(WB_DISPATCH&&WB_DISPATCH.branches[b])||[];
  const units=list.reduce((s,x)=>s+x.send,0);
  const rows=list.map(x=>
    `<div class="prow ${x.shorted?"short":""}">
      <div><div class="nm">${x.name}</div>
        <div class="det">stock ${qty(x.current)} → target ${qty(x.max)}${x.shorted?` · <span class="sh">godown short — ${qty(x.send)} of ${qty(x.need)}</span>`:""}</div></div>
      <div class="send"><div class="q">${qty(x.send)}</div><div class="l">send</div></div></div>`).join("");
  app.innerHTML=`<main>
    <button class="back" id="back">‹ Dispatch</button>
    <div class="pname">${b}</div>
    <div class="dsum" style="margin-top:8px">${list.length} ${list.length===1?"product":"products"} · ${qty(units)} units to send</div>
    <div class="note">Top up to the branch's 20-day level. Amber = the godown couldn't fully cover; biggest-selling branches were filled first.</div>
    ${rows||`<div class="empty">Nothing to send — this branch is at its level.</div>`}
    <footer>From the Inventory Analysis workbook · ${WB_DISPATCH?WB_DISPATCH.date||"":""}</footer></main>`;
  $("back").onclick=()=>{view={screen:"dispatch",mode:"branches"};render();};
}

function render(){
  if(view.screen==="upload")renderUpload();
  else if(view.screen==="list")renderList();
  else if(view.screen==="dispatch")renderDispatch();
  else if(view.screen==="dispatchBranch")renderDispatchBranch();
  else renderDetail();
  if(view.screen!=="list")window.scrollTo(0,0);
}
(function init(){
  WB_DISPATCH=loadWb();
  const s=loadSaved();
  if(s){setReport(s.date,s.products,s.newNames);view={screen:"list",query:"",lens:"sales",cat:"All"};}
  render();})();
</script>
